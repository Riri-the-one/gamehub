<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finaliser la commande - GameHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: #000; color: #e4e4e7; }
        nav {
            background: rgba(9,9,11,0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(168,85,247,0.3);
            padding: 1rem 3rem; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 30px rgba(0,0,0,0.8), 0 0 15px rgba(168,85,247,0.2);
        }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 900; color: #a855f7; letter-spacing: 2px; text-decoration: none; text-shadow: 0 0 15px rgba(168,85,247,0.5); }
        .logo span { color: #06b6d4; }
        .nav-links { display: flex; gap: 2.5rem; align-items: center; }
        .nav-links a { color: #a1a1aa; text-decoration: none; font-size: 1.1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; }
        .nav-links a:hover { color: #fff; text-shadow: 0 0 10px #a855f7; }
        .nav-cart { background: linear-gradient(90deg,#a855f7,#c084fc); color: #fff !important; font-weight: 700; padding: 0.6rem 1.5rem; border-radius: 4px; box-shadow: 0 0 15px rgba(168,85,247,0.4); }

        .page-header {
            background: radial-gradient(circle at 30% 50%, #130b29, #000);
            padding: 3rem; border-bottom: 1px solid rgba(168,85,247,0.2);
        }
        .page-header h1 { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 900; text-transform: uppercase; }
        .page-header h1 span { color: #06b6d4; text-shadow: 0 0 20px rgba(6,182,212,0.5); }
        .page-header p { color: #a1a1aa; margin-top: 0.5rem; font-size: 1.05rem; }

        .content { max-width: 1100px; margin: 0 auto; padding: 3rem; }
        .checkout-layout { display: grid; grid-template-columns: 1fr 340px; gap: 2rem; align-items: flex-start; }

        .form-card { background: #09090b; border: 1px solid #27272a; border-radius: 8px; padding: 2.5rem; position: relative; overflow: hidden; }
        .form-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #a855f7, #06b6d4); }
        .form-card h2 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 2rem; color: #fff; border-bottom: 1px solid #27272a; padding-bottom: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.9rem; color: #a1a1aa; margin-bottom: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"], input[type="email"], textarea {
            width: 100%; background: #000; border: 1px solid #27272a; color: #fff;
            padding: 0.9rem 1rem; border-radius: 4px; font-family: 'Rajdhani', sans-serif;
            font-size: 1rem; transition: all 0.3s;
        }
        input:focus, textarea:focus { outline: none; border-color: #06b6d4; box-shadow: inset 0 0 10px rgba(6,182,212,0.1), 0 0 10px rgba(6,182,212,0.2); }
        textarea { resize: vertical; min-height: 110px; }
        input[disabled] { background: #0a0a0a; color: #52525b; cursor: not-allowed; border-color: #18181b; }

        .btn-submit {
            width: 100%; background: rgba(6,182,212,0.1); color: #fff; border: 1px solid #06b6d4;
            cursor: pointer; padding: 1rem; border-radius: 4px; font-size: 1.1rem; font-weight: 700;
            font-family: 'Rajdhani', sans-serif; text-transform: uppercase; letter-spacing: 2px;
            transition: all 0.3s; box-shadow: 0 0 10px rgba(6,182,212,0.2); margin-top: 0.5rem;
        }
        .btn-submit:hover { background: #06b6d4; box-shadow: 0 0 25px rgba(6,182,212,0.6); transform: translateY(-2px); }

        .summary-card { background: rgba(9,9,11,0.8); border: 1px solid #27272a; border-radius: 8px; padding: 1.75rem; position: sticky; top: 100px; overflow: hidden; }
        .summary-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #06b6d4, #a855f7); }
        .summary-title { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; border-bottom: 1px solid #27272a; padding-bottom: 0.75rem; color: #fff; text-transform: uppercase; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 0.8rem; font-size: 0.95rem; color: #a1a1aa; }
        .summary-item-name { color: #e4e4e7; font-weight: 700; }
        .summary-divider { border: none; border-top: 1px solid #27272a; margin: 1rem 0; }
        .summary-total { display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: 700; color: #a855f7; margin-top: 0.5rem; font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px rgba(168,85,247,0.4); }

        footer { border-top: 1px solid #27272a; background: #09090b; text-align: center; padding: 2.5rem; color: #52525b; font-size: 0.95rem; }
        footer span { color: #a855f7; font-weight: 700; font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo">Game<span>Hub</span></a>
    <div class="nav-links">
        <a href="/">Accueil</a>
        <a href="/produits">Store</a>
        <a href="/panier" class="nav-cart">🛒 Inventaire</a>
    </div>
</nav>

<div class="page-header">
    <h1>Finaliser la <span>Commande</span></h1>
    <p>Renseignez vos informations de livraison pour recevoir votre setup.</p>
</div>

<div class="content">
    <div class="checkout-layout">

        <div class="form-card">
            <h2>Informations de Livraison</h2>
            <form th:action="@{/commander}" method="post">

                <div class="form-row">
                    <div class="form-group">
                        <label for="prenom">Prénom</label>
                        <input type="text" id="prenom" name="prenom" th:value="${session.currentUser.prenom}" required>
                    </div>
                    <div class="form-group">
                        <label for="nom">Nom</label>
                        <input type="text" id="nom" name="nom" th:value="${session.currentUser.nom}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" th:value="${session.currentUser.email}" required>
                </div>

                <div class="form-group">
                    <label for="adresse">Adresse de livraison</label>
                    <textarea name="adresse" id="adresse" placeholder="Numéro, rue, ville, région..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Confirmer et Commander →</button>
            </form>
        </div>

        <div class="summary-card">
            <div class="summary-title">Récapitulatif</div>

            <div th:each="lp : ${panier.lignePaniers}">
                <div class="summary-item">
                    <span class="summary-item-name" th:text="${lp.produits.nom}">Produit</span>
                    <span th:text="${lp.produits.prix * lp.quantite} + ' DH'">Prix</span>
                </div>
                <div class="summary-item" style="font-size:0.82rem; color:#3f3f46; margin-top:-0.5rem; margin-bottom: 0.8rem;">
                    <span>Qté : <span th:text="${lp.quantite}">1</span></span>
                    <span th:text="${lp.produits.prix} + ' DH / unité'">Prix</span>
                </div>
            </div>

            <hr class="summary-divider">

            <div class="summary-item">
                <span>Livraison Express</span>
                <span style="color:#34d399; font-weight:700;">Gratuite</span>
            </div>
            <div class="summary-total">
                <span>TOTAL</span>
                <span th:text="${total} + ' DH'">0 DH</span>
            </div>
        </div>

    </div>
</div>

<footer>
    <p>ZAINAB & ARIJ © 2026 <span>GameHub</span> — Revendeur officiel</p></footer>

</body>
</html>
