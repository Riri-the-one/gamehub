<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier Équipement - GameHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: #000000; color: #e4e4e7; padding: 2rem; }

        nav {
            background: rgba(9, 9, 11, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(168, 85, 247, 0.3);
            padding: 1.5rem; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 3rem; border-radius: 8px; max-width: 800px; margin-left: auto; margin-right: auto;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 900; color: #a855f7; letter-spacing: 2px; text-decoration: none; text-shadow: 0 0 15px rgba(168, 85, 247, 0.5); }
        .logo span { color: #06b6d4; text-shadow: 0 0 15px rgba(6, 182, 212, 0.5); }
        .nav-links a { color: #a1a1aa; text-decoration: none; font-size: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; }
        .nav-links a:hover { color: #fff; text-shadow: 0 0 10px #06b6d4; }

        .container { max-width: 800px; margin: 0 auto; background: rgba(9, 9, 11, 0.8); border: 1px solid #27272a; border-radius: 8px; padding: 3rem; box-shadow: 0 0 30px rgba(0,0,0,0.5); position: relative; }
        .container::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #ec4899, #a855f7, #06b6d4); border-radius: 8px 8px 0 0; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 700; margin-bottom: 2rem; color: #fff; text-transform: uppercase; }
        h1 span { color: #ec4899; text-shadow: 0 0 15px rgba(236, 72, 153, 0.4); }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.95rem; color: #a1a1aa; margin-bottom: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        input, select, textarea {
            width: 100%; padding: 1rem; background: #000; border: 1px solid #27272a;
            border-radius: 4px; color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus { border-color: #ec4899; outline: none; box-shadow: inset 0 0 10px rgba(236, 72, 153, 0.15), 0 0 10px rgba(236, 72, 153, 0.2); }
        textarea { resize: vertical; min-height: 100px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }

        .actions { display: flex; gap: 1rem; margin-top: 2.5rem; }
        .btn {
            flex: 1; padding: 1rem; border-radius: 4px; font-weight: 700; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: all 0.3s; font-family: 'Rajdhani', sans-serif; text-align: center; text-decoration: none; border: none;
        }
        .btn-neon { background: rgba(236, 72, 153, 0.1); color: #fff; border: 1px solid #ec4899; box-shadow: 0 0 10px rgba(236, 72, 153, 0.2); }
        .btn-neon:hover { background: #ec4899; box-shadow: 0 0 20px rgba(236, 72, 153, 0.6); transform: translateY(-2px); }
        .btn-outline { border: 1px solid #27272a; color: #a1a1aa; background: transparent; }
        .btn-outline:hover { border-color: #52525b; color: #fff; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="container">
    <!-- BARRE DE NAVIGATION -->
    <nav>
        <a href="/" class="logo">Game<span>Hub</span></a>
        <div class="nav-links">
            <a href="/admin">← Back to System</a>
        </div>
    </nav>

    <h1>Modifier <span>Équipement</span></h1>

    <!-- Formulaire d'édition Thymeleaf -->
    <form th:action="@{/admin/update-product}" th:object="${produit}" method="POST">
        <!-- Champ caché id -->
        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label for="nom">Désignation Matériel</label>
            <input type="text" id="nom" th:field="*{nom}" placeholder="Ex: Razer Huntsman V2" required>
        </div>

        <div class="form-group">
            <label for="description">Spécifications</label>
            <textarea id="description" th:field="*{description}" placeholder="Détails techniques, switchs, DPI, RGB..."></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="prix">Tarif (DH)</label>
                <input type="number" step="0.01" id="prix" th:field="*{prix}" placeholder="1500" required>
            </div>
            <div class="form-group">
                <label for="quantite">Quantité (Stock)</label>
                <input type="number" id="quantite" th:field="*{quantite}" placeholder="10" required>
            </div>
        </div>

        <div class="form-group">
            <label for="image">Fichier Visuel</label>
            <input type="text" id="image" th:field="*{image}" placeholder="Ex: razer_huntsman.jpg">
            <small style="color: #52525b; font-size: 0.85rem; margin-top: 0.5rem; display: block;">L'image doit être dans src/main/resources/static/images/</small>
        </div>

        <div class="form-group">
            <label for="categorie">Catégorie</label>
            <select id="categorie" th:field="*{categorie.id}" required>
                <option value="">-- Assigner Catégorie --</option>
                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.nom}"></option>
            </select>
        </div>

        <div class="actions">
            <a href="/admin" class="btn btn-outline">Cancel</a>
            <button type="submit" class="btn btn-neon">Update DB</button>
        </div>
    </form>
</div>

</body>
</html>
