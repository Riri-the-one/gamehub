<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement - GameHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: #000; color: #e4e4e7; display: flex; flex-direction: column; min-height: 100vh; }
        nav {
            background: rgba(9,9,11,0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(168,85,247,0.3);
            padding: 1rem 3rem; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 30px rgba(0,0,0,0.8), 0 0 15px rgba(168,85,247,0.2);
        }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 900; color: #a855f7; letter-spacing: 2px; text-decoration: none; text-shadow: 0 0 15px rgba(168,85,247,0.5); }
        .logo span { color: #06b6d4; }

        .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1rem; }

        .container {
            width: 100%; max-width: 560px;
            background: rgba(9,9,11,0.9); border: 1px solid #27272a;
            border-radius: 8px; padding: 3rem;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 20px rgba(168,85,247,0.1);
            position: relative; overflow: hidden;
        }
        .container::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #a855f7, #ec4899, #06b6d4); }

        .badge-sim {
            display: inline-block; background: rgba(168,85,247,0.1); color: #a855f7;
            font-size: 0.8rem; padding: 0.35rem 1rem; border-radius: 50px; font-weight: 700;
            margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 2px;
            border: 1px solid rgba(168,85,247,0.3); box-shadow: 0 0 10px rgba(168,85,247,0.2);
        }
        .center { text-align: center; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; text-align: center; margin-bottom: 0.75rem; text-transform: uppercase; }
        h1 span { color: #a855f7; text-shadow: 0 0 15px rgba(168,85,247,0.5); }
        .subtitle { font-size: 1rem; color: #a1a1aa; text-align: center; margin-bottom: 2.5rem; }

        .price-box {
            background: #000; border: 1px solid rgba(168,85,247,0.3); border-radius: 8px;
            padding: 1.5rem; text-align: center; margin-bottom: 2.5rem;
            box-shadow: inset 0 0 20px rgba(168,85,247,0.05);
        }
        .price-label { font-size: 0.85rem; color: #a1a1aa; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
        .price-val { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 700; color: #a855f7; margin-top: 0.5rem; text-shadow: 0 0 20px rgba(168,85,247,0.5); }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.9rem; color: #a1a1aa; margin-bottom: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        select, input {
            width: 100%; padding: 0.9rem 1rem; background: #000; border: 1px solid #27272a;
            border-radius: 4px; color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 1rem;
            transition: all 0.3s;
        }
        select:focus, input:focus { border-color: #a855f7; outline: none; box-shadow: inset 0 0 10px rgba(168,85,247,0.1), 0 0 10px rgba(168,85,247,0.2); }
        select option { background: #09090b; }

        .card-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .btn-pay {
            width: 100%; padding: 1rem; background: rgba(168,85,247,0.1); color: #fff; border: 1px solid #a855f7;
            border-radius: 4px; font-weight: 700; font-size: 1.1rem; cursor: pointer;
            transition: all 0.3s; font-family: 'Rajdhani', sans-serif; margin-top: 1.5rem;
            text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 15px rgba(168,85,247,0.2);
        }
        .btn-pay:hover { background: #a855f7; box-shadow: 0 0 30px rgba(168,85,247,0.7); transform: translateY(-2px); }

        footer { border-top: 1px solid #27272a; background: #09090b; text-align: center; padding: 2rem; color: #52525b; font-size: 0.9rem; }
        footer span { color: #a855f7; font-weight: 700; font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo">Game<span>Hub</span></a>
</nav>

<div class="main">
    <div class="container">
        <div class="center">
            <span class="badge-sim">🔒 Transaction Sécurisée</span>
        </div>
        <h1>Passer au <span>Paiement</span></h1>
        <p class="subtitle">Finalisez votre acquisition d'équipements gaming</p>

        <div class="price-box">
            <div class="price-label">Montant Total à Régler</div>
            <div class="price-val" th:text="${commande.montant} + ' DH'">0.00 DH</div>
        </div>

        <form action="/commander/payer" method="POST">
            <input type="hidden" name="commandeId" th:value="${commande.id}">

            <div class="form-group">
                <label for="methode">Mode de Paiement</label>
                <select name="methode" id="methode">
                    <option value="CARTE_BANCAIRE">💳 Carte Bancaire</option>
                    <option value="PAYPAL">📱 PayPal</option>
                    <option value="VIREMENT">🏦 Virement Bancaire</option>
                    <option value="CASH">💵 Cash à la Livraison</option>
                </select>
            </div>

            <div id="carte-fields">
                <div class="form-group">
                    <label for="card-num">Numéro de Carte (Simulé)</label>
                    <input type="text" id="card-num" placeholder="4000 1234 5678 9010" value="4000 1234 5678 9010">
                </div>
                <div class="card-row">
                    <div class="form-group">
                        <label for="card-exp">Expiration</label>
                        <input type="text" id="card-exp" placeholder="MM/AA" value="12/28">
                    </div>
                    <div class="form-group">
                        <label for="card-cvv">CVV</label>
                        <input type="password" id="card-cvv" placeholder="•••" value="123">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-pay">⚡ Confirmer et Payer</button>
        </form>
    </div>
</div>

<footer>
    <p>SYSTEM BOOT © 2026 <span>GameHub</span> — Tous droits réservés.</p>
</footer>

<script>
    const select = document.getElementById('methode');
    const carteFields = document.getElementById('carte-fields');
    select.addEventListener('change', function() {
        carteFields.style.display = this.value === 'CARTE_BANCAIRE' ? 'block' : 'none';
    });
</script>

</body>
</html>
